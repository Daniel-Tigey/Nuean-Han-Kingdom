<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暖洹王国官网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
        }

        /* 顶部导航 */
        nav {
            background: #1a365d;
            color: white;
            padding: 16px 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        .menu a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        /* 国家封面区 */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), url("https://picsum.photos/id/1036/1920/1080") center/cover no-repeat;
            color: white;
            text-align: center;
            padding: 100px 20px;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 20px;
            max-width: 700px;
            margin: 0 auto;
        }

        /* 内容区 */
        .container {
            max-width: 1100px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        }

        .card h2 {
            color: #1a365d;
            margin-bottom: 15px;
            font-size: 26px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .info-item {
            padding: 15px;
            background: #f0f4f8;
            border-radius: 8px;
        }

        .flag {
            width: 200px;
            height: 130px;
            background: #005bb7;
            margin: 20px auto;
            position: relative;
            border: 2px solid #ddd;
        }

        .flag::after {
            content: "★";
            color: gold;
            font-size: 50px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* 底部 */
        footer {
            background: #1a365d;
            color: white;
            text-align: center;
            padding: 25px;
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <!-- 导航 -->
    <nav>
        <div class="nav-container">
            <div class="logo">暖洹王国</div>
            <div class="menu">
                <a href="#">首页</a>
                <a href="#">国家概况</a>
                <a href="#">文化</a>
                <a href="#">联系我们</a>
            </div>
        </div>
    </nav>

    <!-- 封面 -->
    <div class="hero">
        <h1>暖洹王国官网</h1>
        <p>自由 · 和平 · 繁荣</p>
    </div>

    <!-- 内容 -->
    <div class="container">
        <div class="card">
            <h2>国家概况</h2>
            <div class="flag"></div>
            <div class="info-grid">
                <div class="info-item"><strong>国家名称：</strong>暖洹王国</div>
                <div class="info-item"><strong>首都：</strong>丹尼尔市</div>
                <div class="info-item"><strong>人口：</strong>3 人</div>
                <div class="info-item"><strong>官方语言：</strong>丹语</div>
                <div class="info-item"><strong>货币：</strong>丹币 (DNK)</div>
                <div class="info-item"><strong>建国日：</strong>2021年5月27日</div>
                <div class="info-item"><strong>政治制度：</strong>君主制</div>
            </div>
        </div>

        <div class="card">
            <h2>📜 国家介绍</h2>
            <p style="line-height:1.8; font-size:16px;">
               暖洹王国是一个和平、开放的国家，拥有美丽的海岸线、现代化的城市和丰富的文化。国家以、环境保护和人民幸福为核心目标，致力于成为宜居、活力的国家。
                <br><br>
                我们尊重自由、平等与法治，欢迎全世界的朋友前来交流、旅游与合作。
            </p>
        </div>
    </div>

    <!-- 底部 -->
    <footer>
        <p>© MMXXVI 暖洹王国 - 虚拟国家官方网站</p>
    </footer>
</body>
</html>
